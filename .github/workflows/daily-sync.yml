name: Daily DART Sync

on:
  schedule:
    - cron: "0 0 * * *"   # KST 09:00
    - cron: "0 9 * * *"   # KST 18:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install && npx prisma generate

      - name: Run daily sync (DART 공시)
        run: npx tsx scripts/daily-sync.ts
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY }}

      - name: Run KOSDAQ extract (Toss API → 이상징후 리포트)
        run: npx tsx scripts/extract-kosdaq.ts
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY }}
          TOSS_CLIENT_ID: ${{ vars.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ vars.TOSS_CLIENT_SECRET }}
        continue-on-error: true   # Toss 실패해도 DART sync는 유지

      - name: Backfill filings (코스닥 5000억 이하 → DART 공시 연결)
        run: npx tsx scripts/backfill-filings.ts --limit 200 --days 90 --cap-filter
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY }}
        continue-on-error: true

      - name: Backfill relations (코스닥 5000억 이하 임원/주주 → 관계망)
        run: npx tsx scripts/backfill-relations.ts --limit 50 --cap-filter
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY }}
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ Dart_Data/
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: daily DART sync [auto]"
            git pull --rebase origin main || true
            git push origin main
          fi
