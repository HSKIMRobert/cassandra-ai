name: Daily DART Sync

on:
  push:
    paths:
      - ".github/workflows/daily-sync.yml"
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dart_key:
        description: "DART API Key"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx prisma generate
      - name: Run daily sync
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL || secrets.DATABASE_URL }}
          DART_API_KEY: ${{ vars.DART_API_KEY || secrets.DART_API_KEY }}
        run: |
          echo "DB: ${#DATABASE_URL} chars, DART: ${#DART_API_KEY} chars"
          npx tsx scripts/daily-sync.ts
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ Dart_Data/
          git diff --staged --quiet || git commit -m "chore: daily DART sync [auto]"
          git push
